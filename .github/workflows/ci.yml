name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      db:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: meterbase
          POSTGRES_PASSWORD: meterbase
          POSTGRES_DB: meterbase
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://meterbase:meterbase@localhost:5432/meterbase?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: apps/api/go.sum

      - name: Download modules
        run: go mod download

      - name: Install tools
        run: make tools

      - name: Migrate
        run: make migrate

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: apps/api
